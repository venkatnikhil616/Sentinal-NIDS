<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rothschild NIDS | SOC Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #000;
    color: white;
    overflow-x: hidden;
}

/* MATRIX */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 0;
}

/* RADAR */
.radar {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 500px;
    height: 500px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    z-index: 0;
}

.radar::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: conic-gradient(rgba(0,255,255,0.4), transparent);
    animation: sweep 3s linear infinite;
}

.radar::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 1px solid rgba(0,255,255,0.2);
    box-shadow:
        0 0 20px rgba(0,255,255,0.2),
        inset 0 0 20px rgba(0,255,255,0.2);
}

.radar.high::before {
    background: conic-gradient(rgba(255,0,0,0.5), transparent);
}

.radar.medium::before {
    background: conic-gradient(rgba(255,165,0,0.5), transparent);
}

/* BLIPS */
#radar-blips {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 500px;
    height: 500px;
    transform: translate(-50%, -50%);
    z-index: 1;
    pointer-events: none;
}

.blip {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    animation: pulse 1.5s infinite;
}

.blip.low { background:#22c55e; box-shadow:0 0 10px #22c55e; }
.blip.medium { background:#f59e0b; box-shadow:0 0 10px #f59e0b; }
.blip.high { background:#ef4444; box-shadow:0 0 15px #ef4444; }

/* CONTENT */
.header, .grid, .card {
    position: relative;
    z-index: 2;
}

.header {
    text-align: center;
    padding: 20px;
    font-size: 24px;
    text-shadow: 0 0 10px #0ff;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap: 15px;
    padding: 20px;
}

.card {
    background: rgba(15,23,42,0.75);
    padding: 15px;
    border-radius: 12px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 20px rgba(0,255,255,0.1);
}

.log {
    font-size: 13px;
    border-bottom: 1px solid #1e293b;
    padding: 6px 0;
}

.safe { color:#22c55e; }
.attack { color:#ef4444; }

/* ANIMATIONS */
@keyframes sweep {
    from {transform: rotate(0deg);}
    to {transform: rotate(360deg);}
}

@keyframes pulse {
    0% {transform:scale(0.6);opacity:0.6;}
    50% {transform:scale(1.6);opacity:1;}
    100% {transform:scale(0.6);opacity:0.6;}
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>
<div class="radar"></div>
<div id="radar-blips"></div>

<div class="header">
🚀 Rothschild NIDS — SOC Dashboard
</div>

<div class="grid">
    <div class="card">
        <h3>Total Traffic</h3>
        <div id="total">{{ stats.total or 0 }}</div>
    </div>
    <div class="card">
        <h3>Attacks</h3>
        <div id="attacks">{{ stats.attacks or 0 }}</div>
    </div>
</div>

<div class="grid">
    <div class="card">
        <h3>🚨 Alerts</h3>
        <div id="alerts-box">
        {% for alert in alerts %}
        <div class="log">
            {{ alert.attack_type }} ({{ alert.severity }})
        </div>
        {% endfor %}
        </div>
    </div>

    <div class="card">
        <h3>📡 Logs</h3>
        <div id="logs-box">
        {% for log in logs %}
        <div class="log">
            {{ log.attack_type }}
        </div>
        {% endfor %}
        </div>
    </div>
</div>

<script>
/* MATRIX */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letters = "01";
const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = Array(Math.floor(columns)).fill(1);

function draw(){
    ctx.fillStyle="rgba(0,0,0,0.05)";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="#0ff";
    ctx.font=fontSize+"px monospace";

    for(let i=0;i<drops.length;i++){
        const text=letters[Math.floor(Math.random()*letters.length)];
        ctx.fillText(text,i*fontSize,drops[i]*fontSize);

        if(drops[i]*fontSize>canvas.height && Math.random()>0.95)
            drops[i]=0;

        drops[i]++;
    }
}
setInterval(draw,50);

/* INITIAL DATA SAFE */
let alertsData = {{ alerts | default([]) | tojson | safe }};

/* RADAR RENDER */
function renderRadar(data){
    const radar = document.getElementById("radar-blips");
    const radarElement = document.querySelector(".radar");

    radar.innerHTML = ""; // clear old blips
    radarElement.classList.remove("high","medium");

    data.forEach(alert=>{
        const blip=document.createElement("div");
        blip.classList.add("blip", alert.severity.toLowerCase());

        const angle=Math.random()*2*Math.PI;
        const radius=Math.random()*220;

        const x=250+radius*Math.cos(angle);
        const y=250+radius*Math.sin(angle);

        blip.style.left=x+"px";
        blip.style.top=y+"px";

        radar.appendChild(blip);
    });

    if(data.some(a=>a.severity==="HIGH")){
        radarElement.classList.add("high");
    } else if(data.some(a=>a.severity==="MEDIUM")){
        radarElement.classList.add("medium");
    }
}

renderRadar(alertsData);

/* 🔥 LIVE REFRESH (NO RELOAD) */
async function refreshData(){
    try{
        const res = await fetch("/dashboard/dashboard_data");
        const data = await res.json();

        // update stats
        document.getElementById("total").innerText = data.stats.total;
        document.getElementById("attacks").innerText = data.stats.attacks;

        // update alerts
        const alertsBox = document.getElementById("alerts-box");
        alertsBox.innerHTML = "";
        data.alerts.forEach(a=>{
            alertsBox.innerHTML += `<div class="log">${a.attack_type} (${a.severity})</div>`;
        });

        // update logs
        const logsBox = document.getElementById("logs-box");
        logsBox.innerHTML = "";
        data.logs.forEach(l=>{
            logsBox.innerHTML += `<div class="log">${l.attack_type}</div>`;
        });

        // update radar
        renderRadar(data.alerts);

    } catch(err){
        console.error("Refresh failed:", err);
    }
}

setInterval(refreshData, 5000);
</script>

</body>
</html>
