<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rothschild NIDS | Secure Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #020617;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* BACKGROUND GLOW */
body::before {
    content: "";
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(0,255,255,0.15), transparent);
    animation: pulse 4s infinite;
}

/* LOGIN CARD */
.login-box {
    position: relative;
    z-index: 1;
    background: rgba(15, 23, 42, 0.9);
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 0 30px rgba(0,255,255,0.2);
    width: 320px;
    text-align: center;
}

/* TITLE */
.login-box h2 {
    margin-bottom: 20px;
    text-shadow: 0 0 10px #0ff;
}

/* INPUTS */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: none;
    border-radius: 8px;
    background: #020617;
    color: white;
    outline: none;
    border: 1px solid #0ff;
    transition: 0.3s;
}

input:focus {
    box-shadow: 0 0 10px #0ff;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    background: #0ff;
    border: none;
    border-radius: 8px;
    color: black;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #22d3ee;
    box-shadow: 0 0 15px #0ff;
}

/* ERROR MESSAGE */
.error {
    color: #ef4444;
    margin-bottom: 10px;
    animation: shake 0.3s;
}

/* ANIMATIONS */
@keyframes pulse {
    0% { transform: scale(1); opacity: 0.5; }
    50% { transform: scale(1.2); opacity: 0.2; }
    100% { transform: scale(1); opacity: 0.5; }
}

@keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    50% { transform: translateX(5px); }
    75% { transform: translateX(-5px); }
    100% { transform: translateX(0); }
}
</style>
</head>

<body>

<div class="login-box">
    <h2>🔐 Secure Access</h2>

    <!-- ✅ ERROR DISPLAY -->
    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
        <input name="username" placeholder="Username" required>
        <input name="password" type="password" placeholder="Password" required>
        <button type="submit">LOGIN</button>
    </form>
</div>

</body>
</html>
